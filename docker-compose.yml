services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: rivendell
    networks:
      - internal
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
      - TS_AUTH_ONCE=true
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    command: sh -c "rm -f /var/run/tailscale/tailscaled.sock && /usr/local/bin/containerboot"
    volumes:
      - ./serve.json:/config/serve.json:ro
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s

  app:
    container_name: app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      internal:
        aliases:
          - rivendell-app
    volumes:
      - ./.env:/app/.env:ro
      - ./pb_data:/app/pb_data
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      tailscale:
        condition: service_healthy

volumes:
  tailscale-state:
  tailscale-sock:

networks:
  internal:
